
services:
  postgres :
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
      - ./database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - interview_network
  

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
        - 8000:8000
    environment:
      DATABASE_URL: ${DATABASE_URL:-"postgresql://postgres:password@postgres:5432/postgres"}
      # LLMs related environment variables
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: 'service_healthy'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - interview_network
  
  frontend:
    build: 
      context: .
      dockerfile: ./ui/interviewai-vite/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: 'service_healthy'
    networks:
      - interview_network



volumes:
  postgres_data:

networks:
  interview_network:
    driver: bridge

